name: Site heartbeat

on:
  schedule:
    - cron: "23 14 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-public-body:
    runs-on: ubuntu-latest
    steps:
      - name: Check public pages
        id: check
        shell: bash
        run: |
          set -u
          urls=(
            "https://veridian-ledger.github.io/veridian-ledger/"
            "https://veridian-ledger.github.io/veridian-ledger/workflow-diagnostic.html"
            "https://veridian-ledger.github.io/veridian-ledger/intake-thanks.html"
          )

          failures=""
          for url in "${urls[@]}"; do
            status="000"
            for attempt in 1 2 3; do
              status="$(curl -L --connect-timeout 10 --max-time 25 -o /tmp/page.html -s -w "%{http_code}" "$url" || true)"
              if [ "$status" = "200" ]; then
                break
              fi
              sleep 10
            done
            if [ "$status" != "200" ]; then
              failures="${failures}\n- ${url} returned HTTP ${status}"
              continue
            fi

            if [ "$url" = "https://veridian-ledger.github.io/veridian-ledger/workflow-diagnostic.html" ]; then
              if ! grep -q "https://formsubmit.co/veridianledger@gmail.com" /tmp/page.html; then
                failures="${failures}\n- ${url} is missing the intake endpoint"
              fi
              if ! grep -q "buy.stripe.com/dRm6oH8VhcMC4Ju96F0co01" /tmp/page.html; then
                failures="${failures}\n- ${url} is missing the diagnostic payment link"
              fi
            fi
          done

          {
            echo "failures<<EOF"
            printf "%b\n" "$failures"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$failures" ]; then
            exit 1
          fi

      - name: Open issue on heartbeat failure
        if: failure() && steps.check.outputs.failures != ''
        uses: actions/github-script@v9
        with:
          script: |
            const failures = `${{ steps.check.outputs.failures }}`.trim();
            const title = "Site heartbeat failure";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
            const existing = issues.find((issue) => issue.title === title);
            const body = [
              "The daily site heartbeat found a public body problem.",
              "",
              failures,
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close recovered heartbeat issue
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const title = "Site heartbeat failure";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: "The site heartbeat recovered. Closing this alarm."
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
